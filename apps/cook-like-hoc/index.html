<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="像老乡鸡那样做饭 - 老乡鸡菜品溯源报告开源菜谱">
  <meta name="theme-color" content="#f8f7f4">
  <title>像老乡鸡那样做饭 - CookLikeHOC</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f8f7f4;
      --foreground: #1a1a1a;
      --card: #ffffff;
      --card-elevated: #ffffff;
      --secondary: #f0eee9;
      --muted: #f0eee9;
      --muted-foreground: #737373;
      --border: #e8e6e1;
      --border-strong: #d6d3cd;
      --accent: #6366f1;
      --accent-subtle: rgba(99, 102, 241, .08);
      --shadow: 0 1px 3px rgba(0, 0, 0, .04), 0 1px 2px rgba(0, 0, 0, .06);
      --radius: 10px;
      --sans: "Geist", "Inter", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --background: #0f0f11;
      --foreground: #f0f0f0;
      --card: #1a1a1d;
      --card-elevated: #222225;
      --secondary: #242428;
      --muted: #242428;
      --muted-foreground: #888888;
      --border: rgba(255, 255, 255, .08);
      --border-strong: rgba(255, 255, 255, .16);
      --accent: #818cf8;
      --accent-subtle: rgba(129, 140, 248, .12);
      --shadow: 0 1px 3px rgba(0, 0, 0, .24), 0 1px 2px rgba(0, 0, 0, .18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }
    button { color: inherit; }
    a { color: inherit; text-decoration: none; }

    /* 返回按钮样式 - 参考 claude-code-prompt */
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      padding: 10px 20px;
      background: var(--card);
      color: var(--accent);
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-button:hover {
      background: var(--accent);
      color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }

    .back-button svg {
      width: 16px;
      height: 16px;
    }

    /* 页面标题 */
    .page-title {
      max-width: 1200px;
      margin: 80px auto 2rem;
      padding: 0 2rem;
      text-align: center;
    }

    .page-title h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--foreground);
      margin-bottom: 0.5rem;
      letter-spacing: -.02em;
    }

    .page-title p {
      font-size: 1rem;
      color: var(--muted-foreground);
    }

    /* Search & Filter */
    .controls {
      max-width: 1200px;
      margin: 1.5rem auto;
      padding: 0 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      background: var(--card);
      color: var(--foreground);
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .category-filter {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .category-btn {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      color: var(--foreground);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }

    .category-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .category-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* Recipe Grid */
    .recipe-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .recipe-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow);
    }

    .recipe-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
    }

    .recipe-image {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: var(--secondary);
    }

    .recipe-info {
      padding: 0.75rem;
    }

    .recipe-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--foreground);
    }

    .recipe-category {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      background: var(--accent-subtle);
      color: var(--accent);
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 1000;
      padding: 2rem;
      overflow-y: auto;
    }

    .modal.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 5vh;
    }

    .modal-content {
      background: var(--card);
      border-radius: 12px;
      max-width: 600px;
      width: 100%;
      overflow: hidden;
      animation: modalSlideIn 0.25s ease-out;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .12);
    }

    @keyframes modalSlideIn {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-image {
      width: 100%;
      height: 280px;
      object-fit: cover;
      background: var(--secondary);
    }

    .modal-body {
      padding: 1.5rem 2rem 2rem;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--foreground);
    }

    .modal-category {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: var(--accent-subtle);
      color: var(--accent);
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    .modal-section {
      margin-bottom: 1.5rem;
    }

    .modal-section:last-child {
      margin-bottom: 0;
    }

    .modal-section h3 {
      font-size: 0.9rem;
      color: var(--muted-foreground);
      margin-bottom: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .modal-section ul, .modal-section ol {
      padding-left: 1.5rem;
      margin: 0;
    }

    .modal-section li {
      margin-bottom: 0.5rem;
      line-height: 1.6;
      color: var(--foreground);
    }

    .modal-section li:last-child {
      margin-bottom: 0;
    }

    .github-link {
      text-align: center;
      padding: 2rem;
      color: var(--muted-foreground);
    }

    .github-link a {
      color: var(--accent);
      text-decoration: none;
    }

    .github-link a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header-content { flex-direction: column; text-align: center; }
      .controls { flex-direction: column; }
      .recipe-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- 返回按钮 -->
  <a href="/" class="back-button" title="返回博客首页">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    返回博客
  </a>

  <!-- 页面标题 -->
  <div class="page-title">
    <h1>🍗 像老乡鸡那样做饭</h1>
    <p>CookLikeHOC - 老乡鸡菜品溯源报告开源版</p>
  </div>

  <div class="controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索菜品名称或食材...">
    </div>
  </div>

  <div class="controls">
    <div class="category-filter" id="categoryFilter">
      <button class="category-btn active" data-category="all">全部</button>
    </div>
  </div>

  <div class="recipe-grid" id="recipeGrid"></div>

  <div class="github-link">
    <p>数据来源于 <a href="https://github.com/Gar-b-age/CookLikeHOC" target="_blank">CookLikeHOC</a> 开源项目</p>
    <p>感谢所有贡献者的付出 ❤️</p>
  </div>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <img class="modal-image" id="modalImage" src="" alt="">
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <span class="modal-category" id="modalCategory"></span>
        <div class="modal-section">
          <h3>🥬 配料</h3>
          <ul id="modalIngredients"></ul>
        </div>
        <div class="modal-section">
          <h3>👨‍🍳 步骤</h3>
          <ol id="modalSteps"></ol>
        </div>
      </div>
    </div>
  </div>

  <script src="./data.js"></script>
  <script>
    const IMAGE_BASE = '/images/cook-like-hoc/'; // 本地图片路径
    let currentCategory = 'all';
    let currentSearch = '';
    const PAGE_SIZE = 50; // 每页显示 50 个菜品
    let currentPage = 1;

    // Initialize
    function init() {
      renderCategories();
      renderRecipes();
      bindEvents();
    }

    // Render category buttons
    function renderCategories() {
      const categories = [...new Set(window.COOK_DATA.map(r => r.category))];
      const filter = document.getElementById('categoryFilter');

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-btn';
        btn.dataset.category = cat;
        btn.textContent = cat;
        filter.appendChild(btn);
      });
    }

    // Render recipe cards
    function renderRecipes() {
      const grid = document.getElementById('recipeGrid');
      grid.innerHTML = '';

      const filtered = window.COOK_DATA.filter(recipe => {
        const matchCategory = currentCategory === 'all' || recipe.category === currentCategory;
        const matchSearch = !currentSearch ||
          recipe.name.includes(currentSearch) ||
          recipe.ingredients.some(i => i.includes(currentSearch));
        return matchCategory && matchSearch;
      });

      if (filtered.length === 0) {
        grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 2rem; color: #999;">没有找到匹配的菜品 🍽️</p>';
        return;
      }

      // 分页
      const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;
      const start = (currentPage - 1) * PAGE_SIZE;
      const end = Math.min(start + PAGE_SIZE, filtered.length);
      const pageItems = filtered.slice(start, end);

      pageItems.forEach(recipe => {
        const card = document.createElement('div');
        card.className = 'recipe-card';
        card.innerHTML = `
          <img class="recipe-image" src="${getImageUrl(recipe.image)}" alt="${recipe.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22180%22><rect fill=%22%23f0f0f0%22 width=%22280%22 height=%22180%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2220%22>🍽️</text></svg>'">
          <div class="recipe-info">
            <div class="recipe-name">${recipe.name}</div>
            <span class="recipe-category">${recipe.category}</span>
          </div>
        `;
        card.addEventListener('click', () => showModal(recipe));
        grid.appendChild(card);
      });

      // 分页控件
      renderPagination(totalPages, filtered.length);
    }

    function renderPagination(totalPages, totalItems) {
      let paginator = document.getElementById('paginator');
      if (!paginator) {
        paginator = document.createElement('div');
        paginator.id = 'paginator';
        paginator.style.cssText = 'max-width:1200px;margin:0 auto;padding:0 2rem 2rem;display:flex;align-items:center;justify-content:center;gap:0.5rem';
        document.querySelector('.github-link').before(paginator);
      }

      paginator.innerHTML = '';

      const prev = document.createElement('button');
      prev.textContent = '‹';
      prev.disabled = currentPage <= 1;
      prev.style.cssText = `padding:0.5rem 1rem;border:1px solid var(--border);border-radius:8px;background:${currentPage <= 1 ? 'var(--secondary)' : 'var(--card)'};color:${currentPage <= 1 ? 'var(--muted-foreground)' : 'var(--foreground)'};cursor:${currentPage <= 1 ? 'default' : 'pointer'}`;
      prev.onclick = () => { if (currentPage > 1) { currentPage--; renderRecipes(); window.scrollTo({ top: 0, behavior: 'smooth' }); }};
      paginator.appendChild(prev);

      const startPage = Math.max(1, currentPage - 2);
      const endPage = Math.min(totalPages, currentPage + 2);

      for (let i = startPage; i <= endPage; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.style.cssText = `padding:0.5rem 0.9rem;border:1px solid ${i === currentPage ? 'var(--accent)' : 'var(--border)'};border-radius:8px;background:${i === currentPage ? 'var(--accent)' : 'var(--card)'};color:${i === currentPage ? '#fff' : 'var(--foreground)'};cursor:pointer;font-weight:${i === currentPage ? '600' : '400'}`;
        btn.onclick = () => { currentPage = i; renderRecipes(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
        paginator.appendChild(btn);
      }

      const next = document.createElement('button');
      next.textContent = '›';
      next.disabled = currentPage >= totalPages;
      next.style.cssText = `padding:0.5rem 1rem;border:1px solid var(--border);border-radius:8px;background:${currentPage >= totalPages ? 'var(--secondary)' : 'var(--card)'};color:${currentPage >= totalPages ? 'var(--muted-foreground)' : 'var(--foreground)'};cursor:${currentPage >= totalPages ? 'default' : 'pointer'}`;
      next.onclick = () => { if (currentPage < totalPages) { currentPage++; renderRecipes(); window.scrollTo({ top: 0, behavior: 'smooth' }); }};
      paginator.appendChild(next);

      // 总数信息
      const info = document.createElement('span');
      info.textContent = `共 ${totalItems} 道`;
      info.style.cssText = 'margin-left:1rem;font-size:0.85rem;color:var(--muted-foreground)';
      paginator.appendChild(info);
    }

    function getImageUrl(path) {
      if (!path) return '';
      if (path.startsWith('http')) return path;
      // Extract filename from path like "images/xxx.png"
      const filename = path.split('/').pop();
      return `${IMAGE_BASE}${encodeURIComponent(filename)}`;
    }

    // Show modal
    function showModal(recipe) {
      const modalImage = document.getElementById('modalImage');
      const imageUrl = getImageUrl(recipe.image);

      // Show or hide image based on availability
      if (imageUrl) {
        modalImage.src = imageUrl;
        modalImage.style.display = 'block';
      } else {
        modalImage.style.display = 'none';
      }

      document.getElementById('modalTitle').textContent = recipe.name;
      document.getElementById('modalCategory').textContent = recipe.category;

      const ingredientsList = document.getElementById('modalIngredients');
      ingredientsList.innerHTML = recipe.ingredients.map(i => `<li>${i}</li>`).join('');

      const stepsList = document.getElementById('modalSteps');
      stepsList.innerHTML = recipe.steps.map(s => `<li>${s}</li>`).join('');

      document.getElementById('modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // Bind events
    function bindEvents() {
      // Category filter
      document.getElementById('categoryFilter').addEventListener('click', e => {
        if (e.target.classList.contains('category-btn')) {
          document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          currentCategory = e.target.dataset.category;
          currentPage = 1;
          renderRecipes();
        }
      });

      // Search
      document.getElementById('searchInput').addEventListener('input', e => {
        currentSearch = e.target.value.trim();
          currentPage = 1;
        renderRecipes();
      });

      // Modal close
      document.getElementById('modal').addEventListener('click', e => {
        if (e.target.id === 'modal') {
          document.getElementById('modal').classList.remove('active');
          document.body.style.overflow = '';
        }
      });

      // ESC to close modal
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          document.getElementById('modal').classList.remove('active');
          document.body.style.overflow = '';
        }
      });
    }

    init();
  </script>
</body>
</html>
