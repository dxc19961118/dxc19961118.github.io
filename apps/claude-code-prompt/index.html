<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code 提示台 - Hexo For Dxc</title>
  <script type="module" crossorigin src="./assets/index.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      padding-top: 56px;
    }

    /* Loading 遮罩 */
    .loading-overlay {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 99999;
      background: var(--ccpw-bg, #f8f7f4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.3s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-text {
      margin-top: 16px;
      color: #64748b;
      font-size: 14px;
      font-weight: 500;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 顶部状态栏 */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10000;
      height: 56px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--ccpw-border, #e8e6e1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .top-bar-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--ccpw-text, #1a1a1a);
      letter-spacing: -0.01em;
    }

    .top-bar-right {
      position: relative;
    }

    /* 返回按钮（内嵌到顶栏） */
    .back-button {
      width: auto;
      flex-shrink: 0;
      padding: 6px 14px;
      background: transparent;
      color: var(--ccpw-text-2, #4a4a4a);
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      border: 1px solid var(--ccpw-border, #e8e6e1);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .back-button:hover {
      background: var(--ccpw-accent-bg, rgba(99, 102, 241, 0.08));
      color: var(--ccpw-accent, #6366f1);
      border-color: var(--ccpw-accent, #6366f1);
    }

    .back-button svg {
      width: 16px;
      height: 16px;
    }

    /* 使用洞察下拉按钮 */
    .insights-trigger {
      padding: 6px 14px;
      background: transparent;
      color: var(--ccpw-accent, #6366f1);
      border: 1px solid var(--ccpw-accent, #6366f1);
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: inherit;
      white-space: nowrap;
    }

    .insights-trigger:hover,
    .insights-trigger.active {
      background: var(--ccpw-accent, #6366f1);
      color: #ffffff;
      border-color: var(--ccpw-accent, #6366f1);
    }

    .insights-trigger svg.chevron {
      width: 12px;
      height: 12px;
      transition: transform 0.2s ease;
    }

    .insights-trigger.active svg.chevron {
      transform: rotate(180deg);
    }

    /* 下拉菜单 */
    .dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 200px;
      background: var(--ccpw-surface, #ffffff);
      border: 1px solid var(--ccpw-border, #e8e6e1);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.04);
      padding: 4px;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-4px);
      transition: all 0.2s ease;
      z-index: 10002;
    }

    .dropdown-menu.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      background: none;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--ccpw-text, #1a1a1a);
      cursor: pointer;
      transition: background-color 0.15s ease;
      text-align: left;
      font-family: inherit;
    }

    .dropdown-item:hover {
      background: var(--ccpw-accent-bg, rgba(99, 102, 241, 0.08));
      color: var(--ccpw-accent, #6366f1);
    }

    .dropdown-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .dropdown-item .item-label {
      flex: 1;
    }

    .dropdown-item .item-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--ccpw-accent-bg, rgba(99, 102, 241, 0.1));
      color: var(--ccpw-accent, #6366f1);
      font-weight: 600;
    }

    .dropdown-item.disabled {
      color: var(--ccpw-text-4, #999);
      cursor: not-allowed;
    }

    .dropdown-item.disabled:hover {
      background: transparent;
      color: var(--ccpw-text-4, #999);
    }

    .dropdown-item.disabled .item-badge {
      background: #f1f5f9;
      color: #94a3b8;
    }

    .dropdown-divider {
      height: 1px;
      background: var(--ccpw-border-subtle, rgba(0,0,0,0.06));
      margin: 4px 8px;
    }
  </style>
</head>

<body>
  <!-- Loading 遮罩 -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在加载...</div>
  </div>

  <!-- 顶部状态栏 -->
  <header class="top-bar">
    <div class="top-bar-left">
      <!-- 返回按钮 -->
      <a href="/" class="back-button" title="返回博客首页">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        返回
      </a>
      <span class="top-bar-title">Claude Code 提示台</span>
    </div>
    <div class="top-bar-right">
      <!-- 使用洞察下拉 -->
      <button class="insights-trigger" id="insights-trigger" title="查看报告">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 3v18h18" />
          <path d="M7 16l4-8 4 4 5-9" />
        </svg>
        使用洞察
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" />
        </svg>
      </button>
      <!-- 下拉菜单 -->
      <div class="dropdown-menu" id="insights-dropdown">
        <a class="dropdown-item" href="/report/report.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 3v18h18" />
            <path d="M7 16l4-8 4 4 5-9" />
          </svg>
          <span class="item-label">使用洞察报告</span>
          <span class="item-badge">NEW</span>
        </a>
        <div class="dropdown-divider"></div>
        <span class="dropdown-item disabled">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <path d="M9 9h6v6H9z" />
          </svg>
          <span class="item-label">更多报告</span>
          <span class="item-badge">敬请期待</span>
        </span>
        <!--
          ============================================================
          扩展新报告项：
          在 .dropdown-menu 内添加一个 <a class="dropdown-item"> 即可。
          href 指向报告页面路径（报告页面需放在 source/report/ 下，
          并在 _config.yml 的 skip_render 中配置）。
          示例：
            <a class="dropdown-item" href="/report/performance.html">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                (图标路径)
              </svg>
              <span class="item-label">性能分析报告</span>
            </a>
          报告页面应自带顶部返回按钮，链接回 /apps/claude-code-prompt/index.html
          ============================================================
        -->
      </div>
    </div>
  </header>

  <!-- Claude Code 提示台应用 -->
  <ccpw-app></ccpw-app>

  <noscript>请启用 JavaScript 以使用提示词工作台。</noscript>

  <script>
    (function () {
      // Loading 逻辑
      const loadingOverlay = document.getElementById('loading-overlay');

      function hideLoading() {
        setTimeout(function () {
          if (loadingOverlay) {
            loadingOverlay.classList.add('hidden');
          }
        }, 500);
      }

      if (document.readyState === 'complete') {
        hideLoading();
      } else {
        window.addEventListener('load', hideLoading);
      }

      // 下拉菜单逻辑
      const trigger = document.getElementById('insights-trigger');
      const dropdown = document.getElementById('insights-dropdown');

      let dropdownOpen = false;

      function toggleDropdown() {
        dropdownOpen = !dropdownOpen;
        dropdown.classList.toggle('open', dropdownOpen);
        trigger.classList.toggle('active', dropdownOpen);
      }

      function closeDropdown() {
        dropdownOpen = false;
        dropdown.classList.remove('open');
        trigger.classList.remove('active');
      }

      // 点击下拉按钮
      trigger.addEventListener('click', function (e) {
        e.stopPropagation();
        toggleDropdown();
      });

      // 点击页面其他地方关闭下拉
      document.addEventListener('click', function () {
        if (dropdownOpen) closeDropdown();
      });

      // ESC 键关闭下拉
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && dropdownOpen) closeDropdown();
      });
    })();
  </script>
</body>

</html>
